    <p>Contactez-moi via ci-dessous : </p>
    <form class="form" id="contactForm" action="mailto:antoine.baroin94@gmail.com" method="post" enctype="text/plain">
        <label for="obligatory">* Champs obligatoires</label>
        <br><br>
        <label for="FirstName">* Prénom</label>
        <input type="text" id="FirstNameInput" name="FirstName" placeholder="Entrez votre prénom" required>
        <br><br>
        <label for="LastName">* Nom de famille</label>
        <input type="text" id="LastNameInput" name="LastName" placeholder="Entrez votre nom de famille"required>
        <br><br>
        <label for="Phone">Téléphone:</label>
        <input type="tel" id="phone" name="phone" placeholder="Entrez votre numéro de téléphone" required>
        <br><br>
        <label for="email">* Email:</label>
        <input type="email" id="email" name="email" placeholder="Entrez votre adresse e-mail" required>
        <br><br>
        <label for="message">* Message:</label>
        <textarea id="message" name="message" placeholder="Écrivez votre message ici" required></textarea>
        <br><br>
        <button type="submit">Envoyer</button>
    </form>
    <p>Vous pouvez également me suivre sur les réseaux suivants :</p>
    <div class="social-media">
        <a href="https://www.linkedin.com/in/antoine-baroin-43b801258/"><img class="social" src="../img/logo-linkedin.png" alt="LinkedIn"></a>
        <a href="https://github.com/BarAnt94"><img class="social" src="../img/GitHub-Mark-ea2971cee799.png" alt="GitHub"></a>
    </div>
